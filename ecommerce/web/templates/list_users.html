{{template "header" .}}

<style>
    /* ===== Users Container ===== */
    .users-container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 0 20px;
    }

    /* ===== Users Table ===== */
    .users-card {
        background-color: rgba(0,0,0,0.75);
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        border: 1px solid rgba(245, 197, 66, 0.1);
    }

    .users-card h3 {
        color: #f5c542;
        font-family: 'Cinzel', serif;
        font-size: 1.6rem;
        margin-top: 0;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(245, 197, 66, 0.3);
        padding-bottom: 15px;
    }

    .users-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        text-align: left;
    }

    .users-table th {
        font-family: 'Cinzel', serif;
        color: #f5c542;
        border-bottom: 2px solid rgba(245, 197, 66, 0.3);
        padding: 12px;
        font-size: 1rem;
    }

    .users-table td {
        padding: 15px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        vertical-align: middle;
    }

    .users-id {
        font-family: monospace;
        color: #ccc;
        font-size: 1rem;
        font-weight: bold;
    }

    .no-users {
        text-align: center;
        color: #aaa;
        font-style: italic;
        padding: 20px 0;
    }

    /* ===== Role Badge ===== */
    .role-badge {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
        text-transform: uppercase;
        background-color: rgba(245, 197, 66, 0.2);
        color: #f5c542;
        border: 1px solid #f5c542;
    }

    /* ===== List Orders Button ===== */
    .btn-list-orders {
        display: inline-block;
        padding: 8px 25px;
        background-color: transparent;
        color: #f5c542;
        border: 2px solid #f5c542;
        text-decoration: none;
        font-weight: bold;
        border-radius: 25px;
        transition: all 0.3s;
        font-size: 0.9rem;
        text-align: center;
    }

    .btn-list-orders:hover {
        background-color: #f5c542;
        color: #000;
        transform: scale(1.05);
    }

</style>

<body>
    
    <div style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
        <section class="page-title">
            <div style="
                background: rgba(20, 20, 40, 0.8);
                padding: 45px;
                border-radius: 18px;
                color: #fff;
                box-shadow: 0 15px 40px rgba(0,0,0,0.7);
                text-align: center;
            ">
                <h2>Registered Users</h2>
                <p>List of all the users of the ecommerce</p>
            </div> 
        </section>
    </div>

    <div class="users-container">
        <section class="users-card">
            
            {{ if .Users }}
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{ range .Users }}
                        <tr>
                            <td class="users-id">{{ .GetUsername }}</td>
                            <td>
                                <span class="role-badge">
                                    {{ .GetRole }}
                                </span>
                            </td>
                            <td style="text-align: right;">
                                <a href="/user/orders?username={{ .GetUsername }}" class="btn-list-orders">Orders</a>
                            </td>
                        </tr>
                        {{ end }}
                    </tbody>
                </table>
            {{ else }}
                <p class="no-users">There are no users registered yet.</p>
            {{ end }}
        </section>
    </div>

</body>

{{template "footer" .}}
