{{template "header" .}}

<style>

    /* ===== Payment Container ===== */
    .payment-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
    }

    .payment-card {
        background-color: rgba(0, 0, 0, 0.75);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h3 {
        font-family: 'Cinzel', serif;
        color: #f5c542;
        font-size: 1.4rem;
        margin-top: 0;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(245, 197, 66, 0.3);
        padding-bottom: 10px;
    }

    /* ===== Order Info Summary Box ===== */
    .order-info-box {
        background-color: rgba(20, 20, 40, 0.8);
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
        border-left: 4px solid #f5c542;
    }

    .order-info-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .order-info-row:last-child {
        margin-bottom: 0;
    }

    .order-info-label {
        color: #aaa;
        font-size: 0.95rem;
    }

    .order-info-value {
        font-weight: bold;
        color: #fff;
    }

    .order-info-value.amount {
        color: #f5c542;
        font-size: 1.3rem;
    }

    /* ===== Inputs & Forms ===== */
    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #ccc;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        box-sizing: border-box;
        background-color: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        transition: border-color 0.3s;
    }

    .form-group input:focus {
        border-color: #f5c542;
        outline: none;
    }

    /* ===== Submit Button ===== */
    .btn-pay {
        width: 100%;
        padding: 14px 0;
        border: none;
        border-radius: 25px;
        background-color: #f5c542;
        color: #000;
        font-weight: bold;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }

    .btn-pay:hover {
        background-color: #ffd966;
        transform: scale(1.02);
    }

    .back-link {
        display: inline-block;
        margin-bottom: 15px;
        color: #f5c542;
        text-decoration: none;
        font-size: 0.95rem;
        transition: opacity 0.2s;
    }

    .back-link:hover {
        opacity: 0.8;
    }
</style>

<body>
    <div style="
        background: rgba(20, 20, 40, 0.5);
        padding: 20px;
        border-radius: 18px;
        color: #fff;
        box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        max-width: 1200px;
        margin: 40px auto;
    ">
        <section class="page-title">
            <h2>Secure Payment</h2>
            <p>Complete your transaction securely</p>
        </section>

        <div class="payment-container">
            <div class="payment-card">
                <a href="/cart" class="back-link">← Cancel and Return</a>
                
                <h3>Payment Details</h3>

                <div class="order-info-box">
                    <div class="order-info-row">
                        <span class="order-info-label">Order ID:</span>
                        <span class="order-info-value">{{ .OrderID }}</span>
                    </div>
                    <div class="order-info-row" style="align-items: center; margin-top: 5px;">
                        <span class="order-info-label">Total to Pay:</span>
                        <span class="order-info-value amount">€{{ .Amount }}</span>
                    </div>
                </div>

                <form action="/payment/process" method="POST">
                    
                    <input type="hidden" name="order_id" value="{{ .OrderID }}">
                    <input type="hidden" name="amount" value="{{ .Amount }}">

                    <div class="form-group">
                        <label for="cardholder">Cardholder Name</label>
                        <input type="text" id="cardholder" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="cardnumber">Card Number</label>
                        <input type="text" id="cardnumber" required placeholder="1234 5678 1234 5678" maxlength="19">
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 2;">
                            <label for="expiry">Expiration Date</label>
                            <input type="text" id="expiry" required placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="cvv">CVV</label>
                            <input type="password" id="cvv" required placeholder="123" maxlength="3">
                        </div>
                    </div>

                    <button type="submit" class="btn-pay">Confirm & Pay €{{ .Amount }}</button>
                </form>
            </div>
        </div>
    </div>
</body>

{{template "footer" .}}
</html>
