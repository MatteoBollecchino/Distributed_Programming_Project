<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FantaWorld – Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<head>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            background:
                linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                url("https://images.unsplash.com/photo-1519681393784-d120267933ba");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .password-box {
            background-color: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 18px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            margin: auto;
        }

        .password-box h1 {
            font-family: 'Cinzel', serif;
            text-align: center;
            color: #f5c542;
            margin-bottom: 10px;
        }

        .password-box p {
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .password-box label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .password-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .password-box input:focus {
            box-shadow: 0 0 0 2px #f5c542;
        }

        .password-box button {
            width: 100%;
            padding: 14px;
            background-color: #f5c542;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: #000;
            margin-top: 10px;
        }

        .password-box button:hover {
            background-color: #ffd966;
            transform: scale(1.03);
        }

        .error-message {
            background-color: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ea868f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .password-box .links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .password-box a {
            color: #f5c542;
            text-decoration: none;
        }

        .password-box a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #f5c542;
            text-decoration: none;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="password-box">
        <a href="/account" class="back-link">← Cancel and return to Account</a>

        <h1>FantaWorld</h1>
        <p>Change Password</p>

        {{ if . }}
            <div class="error-message">
                {{ . }}
            </div>
        {{ end }}

        <form method="POST" action="/change/password">
            <label for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" required autocomplete="current_password">

            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required autocomplete="new_password">

            <label for="confirm_new_password">Confirm New Password</label>
            <input type="password" id="confirm_new_password" name="confirm_new_password" required autocomplete="confirm_new_password">

            <button type="submit">Update Password</button>
        </form>
    </div>

</body>

{{template "footer" .}}
